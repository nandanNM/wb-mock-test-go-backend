<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>wb-mock-test · API Tester</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root { --card:#1e293b; --muted:#94a3b8; --line:#334155; --accent:#38bdf8; --ok:#22c55e; --err:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui, sans-serif; background:#0b1220; color:#e2e8f0; }
  header { position:sticky; top:0; background:#0b1220; border-bottom:1px solid var(--line); padding:14px 20px; z-index:10; }
  h1 { font-size:18px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  h1 .pill { font-size:11px; background:var(--card); border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:2px 8px; font-weight:500; }
  .cfg { display:grid; grid-template-columns:1fr 2fr; gap:8px; align-items:center; }
  input, textarea, select { background:var(--card); color:#e2e8f0; border:1px solid var(--line); border-radius:6px; padding:7px 9px; font:inherit; width:100%; }
  textarea { font-family: ui-monospace, monospace; min-height:64px; }
  button { background:var(--accent); color:#03263a; border:0; border-radius:6px; padding:7px 14px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button.sm { padding:4px 9px; font-size:12px; }
  main { padding:16px 20px; max-width:1100px; margin:0 auto; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:10px; }
  .toolbar .sep { width:1px; height:22px; background:var(--line); }
  .group { margin:22px 0 8px; color:var(--accent); font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:10px 0; }
  .row { display:flex; gap:10px; align-items:center; }
  .method { font-weight:700; padding:2px 8px; border-radius:5px; font-size:12px; min-width:62px; text-align:center; }
  .GET{background:#0e7490;color:#cffafe;} .POST{background:#15803d;color:#dcfce7;}
  .PATCH{background:#a16207;color:#fef9c3;} .PUT{background:#7c3aed;color:#ede9fe;} .DELETE{background:#b91c1c;color:#fee2e2;}
  .path { flex:1; font-family:ui-monospace,monospace; }
  .desc { color:var(--muted); font-size:12px; margin:6px 0; }
  pre { background:#0b1220; border:1px solid var(--line); border-radius:6px; padding:10px; overflow:auto; max-height:340px; margin:8px 0 0; white-space:pre-wrap; word-break:break-word; }
  .status { font-weight:700; } .s2{color:var(--ok);} .s3{color:var(--accent);} .s4,.s5,.s0{color:var(--err);}
  .meta { color:var(--muted); font-weight:400; font-size:12px; }
  .flag { color:var(--ok); cursor:pointer; text-decoration:underline; font-size:12px; }
  label.chk { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; white-space:nowrap; }
  label.chk input { width:auto; }
  a { color:var(--accent); }
  code { background:#0b1220; padding:1px 5px; border-radius:4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// Endpoint catalog. {param} placeholders in the path become editable inline.
const GROUPS = [
  ["Health (public)", [
    {m:"GET", p:"/healthz", note:"Liveness."},
    {m:"GET", p:"/readyz", note:"Readiness (200 if DB reachable, else 503)."},
  ]],
  ["Auth", [
    {m:"GET",  p:"/v1/auth/google/start?client=web", note:"Opens Google login in a new tab. After consent the backend sets cookies and redirects to the dashboard.", open:true},
    {m:"POST", p:"/v1/auth/google/native", body:{id_token:"<google-id-token>"}, note:"Native: exchange a Google ID token for tokens."},
    {m:"POST", p:"/v1/auth/refresh", note:"Web refresh: sends the httpOnly cookie + X-CSRF-Token (auto). Returns access_token — click ‘Use as token’.", capture:true},
    {m:"POST", p:"/v1/auth/refresh", body:{refresh_token:"<refresh-token>"}, note:"Native refresh via body.", capture:true},
    {m:"GET",  p:"/v1/me", note:"Current user + roles + permissions."},
    {m:"POST", p:"/v1/auth/logout"},
    {m:"POST", p:"/v1/auth/logout-all"},
    {m:"GET",  p:"/v1/auth/sessions", note:"Your own devices."},
    {m:"DELETE", p:"/v1/auth/sessions/{id}"},
  ]],
  ["Catalog (user)", [
    {m:"GET", p:"/v1/subjects"},
    {m:"GET", p:"/v1/subjects/{id}/chapters"},
    {m:"GET", p:"/v1/chapters/{id}/tests"},
    {m:"GET", p:"/v1/chapters/{id}/notes"},
  ]],
  ["Mock test (user)", [
    {m:"POST", p:"/v1/tests/{id}/attempts", body:{language_code:"en"}, note:"Open a test → returns attempt_id + questions."},
    {m:"POST", p:"/v1/attempts/{id}/submit", body:{duration_seconds:120, answers:[{question_id:0, selected_option_id:0}]}, note:"Grade + store + streak."},
    {m:"GET",  p:"/v1/attempts/{id}", note:"Result + answer key."},
    {m:"GET",  p:"/v1/me/attempts?page=1&limit=20", note:"Attempt history."},
    {m:"GET",  p:"/v1/me/stats", note:"Points, streak, accuracy."},
  ]],
  ["Admin · subjects", [
    {m:"GET",  p:"/v1/admin/subjects?page=1&limit=20&sort=position&order=asc"},
    {m:"POST", p:"/v1/admin/subjects", body:{name_en:"Math", name_bn:"গণিত", position:1}},
    {m:"GET",  p:"/v1/admin/subjects/{id}"},
    {m:"PATCH",p:"/v1/admin/subjects/{id}", body:{position:2}},
    {m:"DELETE",p:"/v1/admin/subjects/{id}"},
  ]],
  ["Admin · chapters", [
    {m:"GET",  p:"/v1/admin/chapters?page=1&limit=20&subject_id="},
    {m:"POST", p:"/v1/admin/chapters", body:{subject_id:0, name_en:"Algebra", name_bn:"বীজগণিত", position:1}},
    {m:"GET",  p:"/v1/admin/chapters/{id}"},
    {m:"PATCH",p:"/v1/admin/chapters/{id}", body:{name_en:"Algebra II"}},
    {m:"DELETE",p:"/v1/admin/chapters/{id}"},
  ]],
  ["Admin · notes", [
    {m:"GET",  p:"/v1/admin/notes?chapter_id="},
    {m:"POST", p:"/v1/admin/notes", body:{chapter_id:0, language_code:"en", title:"Notes", pdf_url:"https://x/y.pdf", page_count:12}},
    {m:"PATCH",p:"/v1/admin/notes/{id}", body:{title:"Updated"}},
    {m:"DELETE",p:"/v1/admin/notes/{id}"},
  ]],
  ["Admin · questions", [
    {m:"GET",  p:"/v1/admin/questions?chapter_id=&page=1&limit=20"},
    {m:"POST", p:"/v1/admin/questions", body:{chapter_id:0, prompt_en:"2+2?", prompt_bn:"২+২?", position:0, options:[{position:0,body_en:"3",body_bn:"৩",is_correct:false},{position:1,body_en:"4",body_bn:"৪",is_correct:true}]}},
    {m:"GET",  p:"/v1/admin/questions/{id}", note:"Includes options."},
    {m:"PATCH",p:"/v1/admin/questions/{id}", body:{prompt_en:"3+3?", options:[{position:0,body_en:"5",body_bn:"৫",is_correct:false},{position:1,body_en:"6",body_bn:"৬",is_correct:true}]}, note:"Sending options replaces all."},
    {m:"DELETE",p:"/v1/admin/questions/{id}"},
  ]],
  ["Admin · tests", [
    {m:"GET",  p:"/v1/admin/tests?page=1&limit=20&subject_id=&published="},
    {m:"POST", p:"/v1/admin/tests", body:{subject_id:0, scope_type:"chapter", title_en:"Test 1", title_bn:"টেস্ট", test_code:"T-1", difficulty:"easy", position:1, is_published:false, chapter_ids:[0], question_ids:[0]}},
    {m:"GET",  p:"/v1/admin/tests/{id}", note:"Includes chapter_ids + question_ids."},
    {m:"PATCH",p:"/v1/admin/tests/{id}", body:{is_published:true}, note:"Publish / unpublish or edit."},
    {m:"DELETE",p:"/v1/admin/tests/{id}"},
  ]],
  ["Admin · users & moderation", [
    {m:"GET",  p:"/v1/admin/users?page=1&limit=20&status=&search="},
    {m:"GET",  p:"/v1/admin/users/{id}", note:"Returns { user, roles }."},
    {m:"POST", p:"/v1/admin/users/{id}/ban", body:{reason:"spam"}},
    {m:"POST", p:"/v1/admin/users/{id}/suspend", body:{reason:"review"}},
    {m:"POST", p:"/v1/admin/users/{id}/reinstate"},
    {m:"DELETE",p:"/v1/admin/users/{id}", note:"super_admin only."},
  ]],
  ["Admin · sessions / attempts / battles / follows / audit", [
    {m:"GET",  p:"/v1/admin/sessions?user_id="},
    {m:"DELETE",p:"/v1/admin/sessions/{id}"},
    {m:"GET",  p:"/v1/admin/attempts?user_id=&test_id="},
    {m:"GET",  p:"/v1/admin/attempts/{id}", note:"Includes answers."},
    {m:"DELETE",p:"/v1/admin/attempts/{id}", note:"super_admin only."},
    {m:"GET",  p:"/v1/admin/battles?status="},
    {m:"GET",  p:"/v1/admin/battles/{id}", note:"Includes participants."},
    {m:"POST", p:"/v1/admin/battles/{id}/finish"},
    {m:"DELETE",p:"/v1/admin/battles/{id}"},
    {m:"GET",  p:"/v1/admin/follows?follower_id=&followee_id="},
    {m:"DELETE",p:"/v1/admin/follows/{follower}/{followee}"},
    {m:"GET",  p:"/v1/admin/audit?user_id=&limit=50"},
  ]],
  ["Super admin · RBAC", [
    {m:"GET",  p:"/v1/admin/permissions"},
    {m:"POST", p:"/v1/admin/permissions", body:{name:"reports:read", description:"View reports"}},
    {m:"PATCH",p:"/v1/admin/permissions/{id}", body:{description:"Updated"}},
    {m:"DELETE",p:"/v1/admin/permissions/{id}"},
    {m:"GET",  p:"/v1/admin/roles"},
    {m:"GET",  p:"/v1/admin/roles/{id}", note:"Includes permissions."},
    {m:"POST", p:"/v1/admin/roles", body:{name:"analyst", description:"Reports analyst"}},
    {m:"PATCH",p:"/v1/admin/roles/{id}", body:{description:"Updated"}},
    {m:"DELETE",p:"/v1/admin/roles/{id}"},
    {m:"PUT",  p:"/v1/admin/roles/{id}/permissions", body:{permission_ids:["<perm-uuid>"]}, note:"Replaces the whole set."},
    {m:"POST", p:"/v1/admin/users/{id}/roles", body:{role:"admin"}, note:"Grant a single role."},
    {m:"DELETE",p:"/v1/admin/users/{id}/roles/{role}", note:"Revoke a single role."},
    {m:"PUT",  p:"/v1/admin/users/{id}/roles", body:{roles:["admin","teacher"]}, note:"Replace the user's whole role set."},
  ]],
];

function getCookie(name) {
  return document.cookie.split("; ").find(c => c.startsWith(name + "="))?.split("=")[1] ?? "";
}

async function request({ base, path, method, token, body, creds }) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const csrf = getCookie("csrf_token");
  if (csrf) headers["X-CSRF-Token"] = csrf;
  const init = { method, headers, credentials: creds ? "include" : "same-origin" };
  if (body && body.trim() && method !== "GET") init.body = body;
  const started = performance.now();
  try {
    const r = await fetch(base + path, init);
    const text = await r.text();
    const ms = Math.round(performance.now() - started);
    let parsed = null, pretty = text;
    try { parsed = JSON.parse(text); pretty = JSON.stringify(parsed, null, 2); } catch {}
    return { code: r.status, text: pretty, ms, parsed };
  } catch (e) {
    const ms = Math.round(performance.now() - started);
    return { code: 0, ms, text: String(e) + "\n(Network/CORS error — point Base at a backend that allows this origin with credentials.)" };
  }
}

function Response({ res, onToken }) {
  if (!res) return null;
  const accessToken = res.parsed?.data?.access_token;
  return (
    <pre>
      <span className={"status s" + String(res.code)[0]}>{res.code || "ERR"}</span>
      <span className="meta">{"  " + res.ms + " ms"}</span>
      {accessToken && onToken && (
        <>{"  "}<span className="flag" onClick={() => onToken(accessToken)}>↑ Use as token</span></>
      )}
      {"\n" + res.text}
    </pre>
  );
}

function Endpoint({ ep, base, token, creds, onToken }) {
  const [path, setPath] = useState(ep.p);
  const [body, setBody] = useState(ep.body ? JSON.stringify(ep.body, null, 2) : "");
  const [res, setRes] = useState(null);
  const [busy, setBusy] = useState(false);

  async function send() {
    setBusy(true); setRes(null);
    setRes(await request({ base, path, method: ep.m, token, body, creds }));
    setBusy(false);
  }

  return (
    <div className="card">
      <div className="row">
        <span className={"method " + ep.m}>{ep.m}</span>
        <input className="path" value={path} onChange={e => setPath(e.target.value)} />
        {ep.open
          ? <button className="ghost" onClick={() => window.open(base + path, "_blank")}>Open</button>
          : <button onClick={send} disabled={busy}>{busy ? "…" : "Send"}</button>}
      </div>
      {ep.note && <div className="desc">{ep.note}</div>}
      {ep.body && ep.m !== "GET" && <textarea value={body} onChange={e => setBody(e.target.value)} />}
      <Response res={res} onToken={ep.capture ? onToken : null} />
    </div>
  );
}

function App() {
  const [base, setBase] = useState(localStorage.getItem("base") || "http://localhost:8080");
  const [token, setToken] = useState(localStorage.getItem("token") || "");
  const [creds, setCreds] = useState(localStorage.getItem("creds") !== "0");
  const [filter, setFilter] = useState("");
  const [authRes, setAuthRes] = useState(null);

  const save = (k, v, set) => { set(v); localStorage.setItem(k, typeof v === "boolean" ? (v ? "1" : "0") : v); };
  const useToken = (t) => save("token", t, setToken);

  async function run(method, path, body) {
    setAuthRes(null);
    const r = await request({ base, path, method, token, body, creds });
    setAuthRes(r);
    const t = r.parsed?.data?.access_token;
    if (t) useToken(t);
  }

  const groups = useMemo(() => {
    const q = filter.trim().toLowerCase();
    if (!q) return GROUPS;
    return GROUPS
      .map(([name, eps]) => [name, eps.filter(e => (e.p + " " + name).toLowerCase().includes(q))])
      .filter(([, eps]) => eps.length);
  }, [filter]);

  return (
    <>
      <header>
        <h1>wb-mock-test · API Tester <span className="pill">{token ? "authenticated" : "no token"}</span></h1>
        <div className="cfg">
          <input placeholder="Base URL" value={base} onChange={e => save("base", e.target.value, setBase)} />
          <input placeholder="Access token (auto-filled by Refresh, or paste one)" value={token} onChange={e => save("token", e.target.value, setToken)} />
        </div>
        <div className="toolbar">
          <button className="ghost sm" onClick={() => window.open(base + "/v1/auth/google/start?client=web", "_blank")}>Google login</button>
          <button className="sm" onClick={() => run("POST", "/v1/auth/refresh")}>Refresh (web cookie)</button>
          <button className="ghost sm" onClick={() => run("GET", "/v1/me")}>Who am I</button>
          <button className="ghost sm" onClick={() => run("POST", "/v1/auth/logout")}>Logout</button>
          <button className="ghost sm" onClick={() => save("token", "", setToken)}>Clear token</button>
          <div className="sep" />
          <label className="chk"><input type="checkbox" checked={creds} onChange={e => save("creds", e.target.checked, setCreds)} /> send cookies (credentials)</label>
          <input style={{maxWidth:220}} placeholder="Filter endpoints…" value={filter} onChange={e => setFilter(e.target.value)} />
        </div>
        <Response res={authRes} onToken={useToken} />
        <div className="desc">
          Auth: token is sent as <code>Authorization: Bearer</code>; <code>X-CSRF-Token</code> is auto-added from the
          <code>csrf_token</code> cookie. Flow: <b>Google login</b> → <b>Refresh (web cookie)</b> captures the access token →
          then any endpoint below works. CORS: point Base at a backend allowing this origin with credentials.
        </div>
      </header>
      <main>
        {groups.map(([name, eps]) => (
          <div key={name}>
            <div className="group">{name}</div>
            {eps.map((ep, i) => <Endpoint key={name + i} ep={ep} base={base} token={token} creds={creds} onToken={useToken} />)}
          </div>
        ))}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
